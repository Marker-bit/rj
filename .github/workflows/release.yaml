name: release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v1.2.3"
        required: true
        type: string

jobs:
  draft-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Collect release context
        id: context
        env:
          INPUT_TAG: ${{ inputs.tag }}
          RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          SERVER_URL: ${{ github.server_url }}
        run: |
          set -euo pipefail

          tag="${INPUT_TAG:-${GITHUB_REF_NAME}}"
          if ! printf '%s' "$tag" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$'; then
            echo "Tag must look like v1.2.3 or v1.2.3-rc.1" >&2
            exit 1
          fi

          git fetch --force --tags

          if [ -z "${RELEASE_TOKEN:-}" ]; then
            echo "Set a RELEASE_TOKEN repository secret with permission to create releases." >&2
            exit 1
          fi

          release_api_url="${SERVER_URL%/}/api/v1/repos/${REPOSITORY}/releases/tags/${tag}"
          release_status="$(
            curl -sS -o release-check.json -w "%{http_code}" \
              -H "Authorization: token $RELEASE_TOKEN" \
              "$release_api_url"
          )"

          if [ "$release_status" = "200" ]; then
            echo "Release $tag already exists; skipping draft creation."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$release_status" != "404" ]; then
            echo "Failed to check release $tag. HTTP $release_status:" >&2
            cat release-check.json >&2
            exit 1
          fi

          if git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
            target_commit="$(git rev-list -n 1 "$tag")"
            history_ref="$tag"
          else
            target_commit="$GITHUB_SHA"
            history_ref="$target_commit"
            echo "Tag $tag does not exist yet; drafting release from $target_commit."
          fi

          previous_tag="$(git tag --merged "$history_ref" --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$' | grep -F -x -v "$tag" | head -n 1 || true)"
          if [ -n "$previous_tag" ]; then
            range="${previous_tag}..${history_ref}"
          else
            range="$history_ref"
          fi

          {
            echo "skip=false"
            echo "tag=$tag"
            echo "previous_tag=$previous_tag"
            echo "range=$range"
            echo "target_commit=$target_commit"
          } >> "$GITHUB_OUTPUT"

          git log "$range" --no-merges --pretty=format:'- %s (%h)' > commits.txt
          if [ ! -s commits.txt ]; then
            echo "- No non-merge commits found." > commits.txt
          fi

      - name: Generate changelog draft
        if: steps.context.outputs.skip != 'true'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          RELEASE_TAG: ${{ steps.context.outputs.tag }}
          PREVIOUS_TAG: ${{ steps.context.outputs.previous_tag }}
          RELEASE_RANGE: ${{ steps.context.outputs.range }}
        run: |
          set -euo pipefail

          python3 <<'PY'
          import json
          import os
          import urllib.request

          tag = os.environ["RELEASE_TAG"]
          previous_tag = os.environ.get("PREVIOUS_TAG") or "initial release"
          release_range = os.environ["RELEASE_RANGE"]

          with open("commits.txt", encoding="utf-8") as file:
              commits = file.read().strip()

          fallback = "\n".join([
              "## Highlights",
              f"- Draft release for `{tag}`.",
              "",
              "## Changes",
              commits,
              "",
              "## Review Notes",
              f"- Previous release: `{previous_tag}`",
              f"- Commit range: `{release_range}`",
              "",
          ])

          api_key = os.environ.get("OPENAI_API_KEY")
          if not api_key:
              body = fallback
          else:
              model = os.environ.get("OPENAI_MODEL") or "gpt-4.1-mini"
              prompt = f"""Write concise release notes for a Russian reading journal web app.

          Requirements:
          - Output Markdown only.
          - Keep it factual and reviewable.
          - Group changes into: Highlights, Fixes, Technical, Review Notes.
          - Mention the tag, previous tag, and commit range in Review Notes.
          - Do not invent changes that are not supported by the commit list.
          - If a section has nothing relevant, omit it.

          Tag: {tag}
          Previous tag: {previous_tag}
          Commit range: {release_range}

          Commits:
          {commits}
          """

              request = urllib.request.Request(
                  "https://api.openai.com/v1/responses",
                  data=json.dumps({
                      "model": model,
                      "input": prompt,
                      "temperature": 0.2,
                  }).encode("utf-8"),
                  headers={
                      "Authorization": f"Bearer {api_key}",
                      "Content-Type": "application/json",
                  },
                  method="POST",
              )

              try:
                  with urllib.request.urlopen(request, timeout=60) as response:
                      payload = json.loads(response.read().decode("utf-8"))
                  body = payload.get("output_text", "").strip()
                  if not body:
                      body = fallback
              except Exception as error:
                  body = fallback + f"\n\n_AI generation failed, fallback changelog used: `{error}`_\n"

          with open("release-notes.md", "w", encoding="utf-8") as file:
              file.write(body.rstrip() + "\n")
          PY

      - name: Create draft Forgejo release
        if: steps.context.outputs.skip != 'true'
        env:
          RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          RELEASE_TAG: ${{ steps.context.outputs.tag }}
          TARGET_COMMIT: ${{ steps.context.outputs.target_commit }}
          REPOSITORY: ${{ github.repository }}
          SERVER_URL: ${{ github.server_url }}
        run: |
          set -euo pipefail

          if [ -z "${RELEASE_TOKEN:-}" ]; then
            echo "Set a RELEASE_TOKEN repository secret with permission to create releases." >&2
            exit 1
          fi

          api_url="${SERVER_URL%/}/api/v1/repos/${REPOSITORY}/releases"

          python3 <<'PY'
          import json
          import os

          with open("release-notes.md", encoding="utf-8") as file:
              body = file.read()

          tag = os.environ["RELEASE_TAG"]
          payload = {
              "tag_name": tag,
              "target_commitish": os.environ["TARGET_COMMIT"],
              "name": tag,
              "body": body,
              "draft": True,
              "prerelease": "-" in tag,
          }

          with open("release-payload.json", "w", encoding="utf-8") as file:
              json.dump(payload, file)
          PY

          curl --fail-with-body \
            -X POST "$api_url" \
            -H "Authorization: token $RELEASE_TOKEN" \
            -H "Content-Type: application/json" \
            --data @release-payload.json
