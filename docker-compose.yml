services:
  db:
    image: postgres:17
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: rj
    ports:
      - 5433:5432
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "test", "-p", "5432", "-d", "rj"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - pgdata:/var/lib/postgresql/data

  rj:
    image: ghcr.io/marker-bit/rj:latest
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "http://0.0.0.0:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: always
    environment:
      DB_PRISMA_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/rj?schema=public"
      DB_URL_NON_POOLING: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/rj?schema=public"
    ports:
      - 3000:80

volumes:
  pgdata:
