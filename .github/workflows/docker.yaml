name: ci

on:
  push:
    branches: ["master"]

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Login to Forgejo Docker Registry
        uses: docker/login-action@v3
        with:
          registry: tgit.markerbit.dev
          username: ${{ github.actor }}
          password: ${{ secrets.REGISTRY_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            tgit.markerbit.dev/markerbit/rj:latest
            tgit.markerbit.dev/markerbit/rj:${{ github.sha }}
          cache-from: type=registry,ref=tgit.markerbit.dev/markerbit/rj:cache
          cache-to: type=registry,ref=tgit.markerbit.dev/markerbit/rj:cache,mode=max
